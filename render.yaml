services:
  - type: web
    name: genwise-aiml-classroom
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn genwise_classroom.app:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: GENWISE_DATA_DIR
        value: /var/data
      - key: GENWISE_SECRET_KEY
        generateValue: true
